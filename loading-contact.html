<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff8fc;
}

body{
position:relative;
}

/* الدخان الوردي */

.smoke{

position:absolute;

top:0;
left:-150%;

width:180%;
height:100%;

background:
radial-gradient(circle at 10% 20%,rgba(255,170,210,.45),transparent 20%),
radial-gradient(circle at 30% 60%,rgba(255,120,190,.40),transparent 22%),
radial-gradient(circle at 60% 35%,rgba(255,180,220,.38),transparent 18%),
radial-gradient(circle at 80% 70%,rgba(255,140,200,.35),transparent 20%),
linear-gradient(90deg,
rgba(255,230,242,0),
rgba(255,170,210,.55),
rgba(255,120,190,.65),
rgba(255,170,210,.55),
rgba(255,230,242,0)
);

filter:blur(35px);

animation:wind 3.5s ease-in-out forwards;

z-index:5;

}

@keyframes wind{

0%{

left:-150%;
transform:scaleX(.8);

}

50%{

transform:scaleX(1.05);

}

100%{

left:120%;
transform:scaleX(.9);

}

}

/* الورود */

.flower{

position:absolute;

font-size:24px;

opacity:0;

animation:flowers 3.5s linear forwards;

z-index:10;

}

@keyframes flowers{

0%{

transform:translateX(-250px) rotate(0deg);

opacity:0;

}

15%{

opacity:1;

}

85%{

opacity:1;

}

100%{

transform:translateX(calc(100vw + 250px))
translateY(-40px)
rotate(1080deg);

opacity:0;

}

}

</style>

</head>

<body>

<div class="smoke"></div>

<div class="flower" style="top:2%;animation-delay:.0s;">🌸</div>
<div class="flower" style="top:8%;animation-delay:.1s;">🌸</div>
<div class="flower" style="top:14%;animation-delay:.2s;">🌺</div>
<div class="flower" style="top:20%;animation-delay:.3s;">🌸</div>
<div class="flower" style="top:26%;animation-delay:.4s;">🌺</div>
<div class="flower" style="top:32%;animation-delay:.5s;">🌸</div>
<div class="flower" style="top:38%;animation-delay:.6s;">🌸</div>
<div class="flower" style="top:44%;animation-delay:.7s;">🌺</div>
<div class="flower" style="top:50%;animation-delay:.8s;">🌸</div>
<div class="flower" style="top:56%;animation-delay:.9s;">🌸</div>
<div class="flower" style="top:62%;animation-delay:1s;">🌺</div>
<div class="flower" style="top:68%;animation-delay:1.1s;">🌸</div>
<div class="flower" style="top:74%;animation-delay:1.2s;">🌸</div>
<div class="flower" style="top:80%;animation-delay:1.3s;">🌺</div>
<div class="flower" style="top:86%;animation-delay:1.4s;">🌸</div>
<div class="flower" style="top:92%;animation-delay:1.5s;">🌸</div>

<script>

document.querySelectorAll(".flower").forEach(function(f){

f.style.left=(-150-Math.random()*300)+"px";

f.style.fontSize=(18+Math.random()*20)+"px";

});

setTimeout(function(){

    window.location.href = "contact.html";

},3500);

</script>

</body>
</html>
