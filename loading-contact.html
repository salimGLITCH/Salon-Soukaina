<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:white;
}

.wave{
position:fixed;
left:-120%;
top:0;
width:120%;
height:100%;
background:#ff7eb6;
clip-path:polygon(
0% 0%,
8% 3%,
15% 0%,
22% 5%,
30% 1%,
38% 7%,
46% 2%,
54% 8%,
62% 3%,
70% 9%,
78% 4%,
86% 10%,
94% 5%,
100% 0%,
100% 100%,
94% 95%,
86% 100%,
78% 94%,
70% 99%,
62% 92%,
54% 97%,
46% 90%,
38% 96%,
30% 91%,
22% 97%,
15% 92%,
8% 98%,
0% 100%
);

animation:wind 2.8s linear forwards;
}

.flower{
position:absolute;
font-size:24px;
animation:fly 2.8s linear forwards;
}

@keyframes wind{

0%{
left:-120%;
}

100%{
left:100%;
}

}

@keyframes fly{

0%{
transform:translateX(-100px) rotate(0deg);
opacity:0;
}

15%{
opacity:1;
}

100%{
transform:translateX(120vw) rotate(720deg);
opacity:0;
}

}

</style>

</head>

<body>

<div class="wave"></div>

<script>

for(let i=0;i<60;i++){

let f=document.createElement("div");

f.className="flower";

f.innerHTML="🌸";

f.style.top=Math.random()*100+"vh";

f.style.left=(-80-Math.random()*300)+"px";

f.style.animationDelay=(Math.random()*0.8)+"s";

f.style.fontSize=(18+Math.random()*22)+"px";

document.body.appendChild(f);

}

setTimeout(function(){

window.location="contact.html";

},2800);

</script>

</body>
</html>
