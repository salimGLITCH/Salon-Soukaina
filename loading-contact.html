*{
    margin:0;

    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

h1{
    position:absolute;
    z-index:10;
    color:#e91e63;
    font-size:42px;
    animation:fade 1.5s infinite;
}

@keyframes fade{

0%,100%{
opacity:1;
}

50%{
opacity:.4;
}

}

.petal{

    position:absolute;
    top:-80px;
    font-size:35px;
    animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(120vh) translateX(150px) rotate(720deg);
opacity:0;
}

}

.p1{left:5%;animation-duration:5s;}
.p2{left:15%;animation-duration:6s;}
.p3{left:25%;animation-duration:4.5s;}
.p4{left:35%;animation-duration:5.5s;}

.p7{left:65%;animation-duration:4.8s;}
.p8{left:75%;animation-duration:6.2s;}
.p9{left:85%;animation-duration:5.4s;}
.p10{left:95%;animation-duration:6s;}

</style>
