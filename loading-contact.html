<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#fff7fa;
position:relative;
}

/* الرياح */

.wind{

position:absolute;

top:0;

left:-120%;

width:120%;

height:100%;

background:linear-gradient(
90deg,
transparent 0%,
rgba(255,182,213,.25) 20%,
rgba(255,105,180,.45) 40%,
rgba(255,182,213,.25) 70%,
transparent 100%
);

animation:windMove 2.8s ease-in-out forwards;

z-index:5;

}

@keyframes windMove{

0%{

left:-120%;

}

100%{

left:120%;

}

}

/* الورود */

.flower{

position:absolute;

font-size:34px;

opacity:0;

animation:flowerMove 2.8s linear forwards;

z-index:10;

}

@keyframes flowerMove{

0%{

transform:translateX(-150px) rotate(0deg);

opacity:0;

}

20%{

opacity:1;

}

80%{

opacity:1;

}

100%{

transform:translateX(calc(100vw + 200px)) rotate(720deg);

opacity:0;

}

}

</style>

</head>

<body>

<div class="wind"></div>

<div class="flower" style="top:5%;animation-delay:.0s;">🌸</div>
<div class="flower" style="top:12%;animation-delay:.1s;">🌸</div>
<div class="flower" style="top:20%;animation-delay:.2s;">🌸</div>
<div class="flower" style="top:28%;animation-delay:.3s;">🌸</div>
<div class="flower" style="top:36%;animation-delay:.4s;">🌸</div>
<div class="flower" style="top:44%;animation-delay:.5s;">🌸</div>
<div class="flower" style="top:52%;animation-delay:.6s;">🌸</div>
<div class="flower" style="top:60%;animation-delay:.7s;">🌸</div>
<div class="flower" style="top:68%;animation-delay:.8s;">🌸</div>
<div class="flower" style="top:76%;animation-delay:.9s;">🌸</div>
<div class="flower" style="top:84%;animation-delay:1s;">🌸</div>

<script>

document.querySelectorAll(".flower").forEach(f=>{

f.style.left="-120px";

});

setTimeout(function(){

    window.location.href="contact.html";

},2800);

</script>

</body>
</html>
