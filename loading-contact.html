<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Contact</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#fff7fb}
#overlay{position:fixed;inset:0;background:linear-gradient(90deg,#ffd8ea 0%,#ff9fc9 40%,#ffd8ea 80%);transform:translateX(-120%);animation:wind 2.6s ease-in-out forwards;}
.petal{position:fixed;left:-60px;font-size:24px;animation:petal 2.6s linear forwards}
@keyframes wind{
0%{transform:translateX(-120%)}
15%{transform:translateX(-70%)}
100%{transform:translateX(120%)}
}
@keyframes petal{
0%{transform:translate(-80px,0) rotate(0);opacity:0}
15%{opacity:1}
100%{transform:translate(calc(100vw + 120px),40px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>
<div id="overlay"></div>
<script>
for(let i=0;i<45;i++){
 const p=document.createElement('div');
 p.className='petal';
 p.textContent='🌸';
 p.style.top=(Math.random()*100)+'vh';
 p.style.animationDelay=(Math.random()*0.8)+'s';
 p.style.fontSize=(18+Math.random()*20)+'px';
 document.body.appendChild(p);
}
setTimeout(()=>location.href='contact.html',2600);
</script>
</body>
</html>
