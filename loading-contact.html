<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd9ea,#fff8fb);
font-family:Arial,sans-serif;
}

h1{
position:absolute;
color:#e91e63;
font-size:45px;
z-index:100;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;transform:scale(1);}
50%{opacity:.6;transform:scale(1.08);}
}

.petal{
position:absolute;
top:-100px;
font-size:35px;
animation:wind linear infinite;
opacity:.9;
}

@keyframes wind{

0%{
transform:translate(-100px,-100px) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translate(250px,120vh) rotate(1080deg);
opacity:0;
}

}

</style>

</head>

<body>

<h1>🌸 Welcome 🌸</h1>

<script>

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="petal";

p.innerHTML="🌸";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=(3+Math.random()*4)+"s";

p.style.animationDelay=Math.random()*3+"s";

p.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(p);

}

setTimeout(function(){

window.location.href="contact.html";

},3000);

</script>

</body>
</html>
