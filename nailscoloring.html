<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nails Coloring - Salon Soukaina</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff0f5;
    text-align:center;
}

h1{
    color:#d63384;
    margin:30px 0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.back{
    display:inline-block;
    margin:30px;
    padding:15px 30px;
    background:#d63384;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
}

.back:hover{
    background:#b0256d;
}
</style>

</head>
<body>

<h1>Nails Coloring</h1>

<div class="gallery">

<img src="images/nailcolor1.jpg" alt="">
<img src="images/nailcolor2.jpg" alt="">
<img src="images/nailcolor3.jpg" alt="">
<img src="images/nailcolor4.jpg" alt="">
<img src="images/nailcolor5.jpg" alt="">
<img src="images/nailcolor6.jpg" alt="">
<img src="images/nailcolor7.jpg" alt="">
<img src="images/nailcolor8.jpg" alt="">
<img src="images/nailcolor9.jpg" alt="">
<img src="images/nailcolor10.jpg" alt="">

</div>

</body>
</html>
