<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow Us | Salon Soukaina</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffe6f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    text-align:center;
    width:350px;
}

h1{
    color:#e91e63;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    font-size:20px;
    transition:.3s;
}

.instagram{
    background:#E1306C;
}

.instagram:hover{
    transform:scale(1.05);
}

.tiktok{
    background:#000;
}

.tiktok:hover{
    transform:scale(1.05);
}

.back{
    background:#ff69b4;
}

.back:hover{
    transform:scale(1.05);
}

i{
    margin-right:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>Follow Us</h1>

<a class="btn instagram"
href="https://instagram.com/salonsoukaina1"
target="_blank">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a class="btn tiktok"
href="https://tiktok.com/@1salonsoukaina"
target="_blank">
<i class="fab fa-tiktok"></i>
TikTok
</a>

<a class="btn back" href="index.html">
⬅ Back to Home
</a>

</div>

</body>
</html>
