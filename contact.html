.contact-box p{

    display:block;
    width:250px;
    margin:15px auto;

    background:#E1306C;
}

.tiktok{
    background:#000;

.social:hover{

    margin-top:30px;

    background:#e91e63;
    color:white;
    text-decoration:none;
    border-radius:10px;
