<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Salon Soukaina</title>

    <link rel="stylesheet" href="style.css">

    <style>

    .contact-info{
        width:90%;
        max-width:800px;
        margin:40px auto;
        text-align:center;
    }

    .contact-info h2{
        color:#e91e63;
        margin-bottom:20px;
        font-size:36px;
    }

    .contact-info p{
        font-size:20px;
        margin:15px 0;
    }

    .follow-section{
        width:100%;
        background:#ffe4ef;
        padding:40px 20px;
        text-align:center;
        margin-top:40px;
    }

    .follow-section h2{
        color:#e91e63;
        font-size:36px;
        margin-bottom:30px;
    }

    .social-btn{
        display:block;
        width:300px;
        max-width:90%;
        margin:15px auto;
        padding:18px;
        text-decoration:none;
        color:white;
        font-size:22px;
        font-weight:bold;
        transition:.3s;
    }

    .instagram{
        background:#E1306C;
    }

    .tiktok{
        background:#000;
    }

    .social-btn:hover{
        transform:scale(1.05);
    }

    .back-home{
        text-align:center;
        margin:40px 0;
    }

    .back-home a{
        display:inline-block;
        padding:15px 30px;
        background:#e91e63;
        color:white;
        text-decoration:none;
        font-weight:bold;
    }

    @media(max-width:768px){

        .contact-info h2{
            font-size:28px;
        }

        .contact-info p{
            font-size:17px;
        }

        .follow-section h2{
            font-size:28px;
        }

        .social-btn{
            font-size:18px;
            width:90%;
        }

    }

    </style>

</head>

<body>

<header>

    <h1>Salon Soukaina</h1>

    <p>Contact Us</p>

</header>

<section class="contact-info">

    <h2>Contact Information</h2>

    <p>📍 Fes,Morocco</p>

    <p>📞 +212 6 32 37 49 91</p>

    <p>📧 salonsoukaina@gmail.com</p>

</section>

<section class="follow-section">

    <h2>Follow Us</h2>

    <a href="https://instagram.com/salonsoukaina1"
       class="social-btn instagram"
       target="_blank">
       📷 Instagram
    </a>

    <a href="https://tiktok.com/@1salonsoukaina"
       class="social-btn tiktok"
       target="_blank">
       🎵 TikTok
    </a>

</section>

<div class="back-home">

    <a href="index.html">
        ⬅ Back to Home
    </a>

</div>

</body>
</html>
